openapi: 3.0.0
info:
  title: BookBuddy TTS Plugin
  description: |
    AI 读书伴侣 - 文本转语音插件
    
    支持三种模式：
    1. **基本 TTS** - 使用内置音色快速生成
    2. **声音设计** - 通过文本描述创造独特声音
    3. **声音克隆** - 通过 5 秒音频克隆声音
    
    所有模式均调用 MiMo API，返回 MP3 音频文件。
  version: 1.0.0
  contact:
    name: BookBuddy
    url: https://github.com/lssuzie/bookbuddy

servers:
  - url: https://api.xiaomimimo.com/v1
    description: MiMo TTS API Server

tags:
  - name: TTS
    description: 文本转语音接口
  - name: Voices
    description: 音色管理

paths:
  /chat/completions:
    post:
      tags:
        - TTS
      summary: 生成音频
      description: |
        根据文本生成音频文件，支持三种模式：
        
        **基本 TTS (mimo-v2.5-tts)**
        - 使用内置音色
        - 响应快，适合快速生成
        - 支持 8 种内置音色
        
        **声音设计 (mimo-v2.5-tts-voicedesign)**
        - 通过文本描述创造声音
        - 适合个性化需求
        - 需要详细描述声音特征
        
        **声音克隆 (mimo-v2.5-tts-voiceclone)**
        - 通过音频文件克隆声音
        - 需要 5 秒以上参考音频
        - 适合复刻特定声音
        
        **分块策略**
        - 自动按模式调整：克隆 ≤100 字符，TTS ≤300 字符，设计 ≤500 字符
        - 支持手动指定 `chunk_size` 参数
      operationId: generateAudio
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TTSRequest'
            examples:
              basic_tts:
                summary: 基本 TTS 模式
                description: 使用内置音色快速生成
                value:
                  model: "mimo-v2.5-tts"
                  messages:
                    - role: "user"
                      content: "你好，这是《道德经》第一章：道可道，非常道。名可名，非常名。"
                  voice: "白桦"
                  chunk_size: 300
              
              voice_design:
                summary: 声音设计模式
                description: 通过文本描述创造声音
                value:
                  model: "mimo-v2.5-tts-voicedesign"
                  messages:
                    - role: "user"
                      content: "温暖、知性、有活力的女性声音，语速适中，适合睡前阅读。"
                  text: "晚安，愿你有个好梦。"
                  preset: "睡前催眠"
              
              voice_clone:
                summary: 声音克隆模式
                description: 通过音频文件克隆声音
                value:
                  model: "mimo-v2.5-tts-voiceclone"
                  messages:
                    - role: "user"
                      content: "这是《孙子兵法》：兵者，国之大事，死生之地，存亡之道，不可不察也。"
                  voice_reference_audio: "data:audio/mp3;base64,..."
                  chunk_size: 100
      responses:
        '200':
          description: 音频生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TTSResponse'
              examples:
                success:
                  summary: 生成成功
                  value:
                    id: "tts_abc123"
                    object: "text-to-speech"
                    created: 1704067200
                    model: "mimo-v2.5-tts"
                    audio_url: "https://cdn.xiaomimimo.com/audio/tts_abc123.mp3"
                    audio_base64: "data:audio/mp3;base64,