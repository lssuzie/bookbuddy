openapi: 3.0.0
info:
  title: BookBuddy TTS Plugin for Dify
  description: |
    AI 读书伴侣 - 文本转语音插件
    
    支持三种模式：
    1. 基本 TTS - 使用内置音色快速生成
    2. 声音设计 - 通过文本描述创造声音
    3. 声音克隆 - 通过音频文件克隆声音
    
    所有模式均调用 MiMo API，返回 MP3 音频文件。
  version: 1.0.0
  contact:
    name: BookBuddy
    url: https://github.com/lssuzie/bookbuddy

servers:
  - url: https://api.xiaomimimo.com/v1
    description: MiMo TTS API Server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API-Key

paths:
  /chat/completions:
    post:
      tags:
        - TTS
      summary: Generate Audio
      operationId: generateAudio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                model:
                  type: string
                  enum:
                    - mimo-v2.5-tts
                    - mimo-v2.5-tts-voicedesign
                    - mimo-v2.5-tts-voiceclone
                  default: mimo-v2.5-tts
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [user, system, assistant]
                      content:
                        type: string
                voice:
                  type: string
                  description: Built-in voice name (Basic TTS mode)
                preset:
                  type: string
                  description: Voice design preset (Voice Design mode)
                voice_reference_audio:
                  type: string
                  description: Reference audio for voice cloning (Voice Clone mode)
                chunk_size:
                  type: integer
                  default: 300
                  minimum: 50
                  maximum: 500
      responses:
        '200':
          description: Audio generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  created:
                    type: integer
                  model:
                    type: string
                  audio_url:
                    type: string
                  audio_base64:
                    type: string
                  duration:
                    type: number
                  text:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Unauthorized - Invalid API Key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /voices:
    get:
      tags:
        - Voices
      summary: List Available Voices
      operationId: listVoices
      responses:
        '200':
          description: List of available voices
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        gender:
                          type: string
                        language:
                          type: string
                        description:
                          type: string

  /voice-presets:
    get:
      tags:
        - Voice Design
      summary: List Voice Design Presets
      operationId: listVoicePresets
      responses:
        '200':
          description: List of voice design presets
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        tone:
                          type: string
                        speed:
                          type: number